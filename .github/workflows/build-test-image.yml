name: Build and push test docker image

on:
  push:
    branches: ["main"]
  pull_request_target:
    types: [labeled]

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-docker:
    name: Build Docker Image
    if: |
      github.event_name != 'pull_request_target' ||
      contains(github.event.pull_request.labels.*.name, 'safe-to-test')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        include:
          - os: linux
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    outputs:
      privRepo: ${{ steps.output-image.outputs.privRepo }}
      privTagSuffix: ${{ steps.output-image.outputs.privTagSuffix }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker image
        uses: docker/build-push-action@v7
        with:
          build-args: LDFLAGS=-X 'github.com/aws/secrets-store-csi-driver-provider-aws/server.Version=fakeversion' -X 'github.com/aws/secrets-store-csi-driver-provider-aws/server.ProviderVersion=fakeversion' -extldflags '-static'
          context: .
          platforms: ${{ matrix.os }}/${{ matrix.arch }}
          load: true
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/test-build:latest-${{ matrix.arch }}-${{ github.run_id }}

      - name: Output image metadata
        id: output-image
        run: |
          echo "privRepo=ghcr.io/${{ github.repository_owner }}/test-build" >> "$GITHUB_OUTPUT"
          echo "privTagSuffix=${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: List images
        run: |
          docker image ls -a

  integration-tests:
    name: Integration Tests
    if: |
      github.event_name != 'pull_request_target' ||
      contains(github.event.pull_request.labels.*.name, 'safe-to-test')
    needs: build-docker
    uses: ./.github/workflows/integ.yml
    with:
      imageRepo: ${{ needs.build-docker.outputs.privRepo }}
      imageTagAmd64: latest-amd64-${{ needs.build-docker.outputs.privTagSuffix }}
      imageTagArm64: latest-arm64-${{ needs.build-docker.outputs.privTagSuffix }}
    permissions:
      id-token: write
      contents: read
      packages: read
    secrets: inherit
