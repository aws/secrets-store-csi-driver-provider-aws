name: "Release Helm Chart"

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  unit-test:
    uses: ./.github/workflows/go.yml
  extract-image-info:
    runs-on: ubuntu-latest
    outputs:
      imageRepo: ${{ steps.extract.outputs.imageRepo }}
      imageTag: ${{ steps.extract.outputs.imageTag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Extract image repo and tag from values.yaml
        id: extract
        run: |
          echo "imageRepo=$(yq '.image.repository' charts/secrets-store-csi-driver-provider-aws/values.yaml)" >> "$GITHUB_OUTPUT"
          echo "imageTag=$(yq '.image.tag' charts/secrets-store-csi-driver-provider-aws/values.yaml)" >> "$GITHUB_OUTPUT"
  integration-tests:
    needs: [extract-image-info]
    uses: ./.github/workflows/integ.yml
    with:
      imageRepo: ${{ needs.extract-image-info.outputs.imageRepo }}
      imageTagAmd64: ${{ needs.extract-image-info.outputs.imageTag }}
      imageTagArm64: ${{ needs.extract-image-info.outputs.imageTag }}
    permissions:
      contents: read
      packages: read
      id-token: write
    secrets: inherit
  release:
    needs: [unit-test, integration-tests]
    permissions:
      contents: write
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443
            kubernetes-sigs.github.io:443
            release-assets.githubusercontent.com:443
            get.helm.sh:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Setup Helm
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Add SSCD Helm Repo
        run: helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          config: cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
