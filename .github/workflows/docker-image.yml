name: Docker Image CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        include:
        - os: linux
        - arch: amd64
          runner: ubuntu-latest
        - arch: arm64
          runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build the Docker image
        uses: docker/build-push-action@v7
        with:
          build-args: LDFLAGS=-X 'github.com/aws/secrets-store-csi-driver-provider-aws/server.Version=fakeversion' -X 'github.com/aws/secrets-store-csi-driver-provider-aws/server.ProviderVersion=fakeversion' -extldflags '-static'
          context: .
          platforms: ${{ matrix.os }}/${{ matrix.arch }}
          load: true
          tags: test-build:latest-${{ matrix.arch }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: test-build:latest-${{ matrix.arch }}
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: List images
        run: |
          docker image ls -a
