name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=5 -timeout=30m ./provider/ ./server/ ./utils/ | tee bench-result.txt

      - name: Download previous benchmark result
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v5
        with:
          path: bench-baseline.json
          key: benchmark-baseline-${{ runner.os }}

      - name: Compare benchmarks
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'go'
          output-file-path: bench-result.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          external-data-json-path: bench-baseline.json
          comment-on-alert: true
          summary-always: true

      - name: Cache baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: bench-baseline.json
          key: benchmark-baseline-${{ runner.os }}
